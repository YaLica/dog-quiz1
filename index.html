<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корги Карусель</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 800px;
            position: relative;
            overflow: hidden;
            background: #000;
            border-radius: 16px;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background-size: cover;
            background-position: center;
        }
        .screen.active {
            display: block;
        }

        /* Экран 1: Обложка */
        #screen-cover {
            background-image: url('cover.png');
            cursor: pointer;
        }
        .start-btn-container {
            position: absolute;
            bottom: 10%;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .btn-img {
            width: 200px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-img:hover {
            transform: scale(1.05);
        }

        /* Экран 2: Видео */
        #screen-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Экраны свайпа (Лондон) */
        .london-screen {
            background-image: url('london-bg.png');
        }
        .character {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 80%;
            max-height: 50%;
            object-fit: contain;
        }
        .ui-buttons {
            position: absolute;
            bottom: 8%;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
        }
        .ui-buttons img {
            width: 100px;
            height: auto;
            cursor: pointer;
        }

        /* Навигация для свайпа (стрелочки для десктопа / зоны клика) */
        .nav-zone {
            position: absolute;
            top: 0;
            bottom: 15%;
            width: 15%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.05);
            user-select: none;
        }
        .nav-left { left: 0; }
        .nav-right { right: 0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-cover" class="screen active" onclick="startGame()">
        <div class="start-btn-container">
            <img src="btn-default.png" class="btn-img" alt="Старт">
        </div>
    </div>

    <div id="screen-video" class="screen">
        <video id="game-video" playsinline poster="preview-thumb.jpg">
            <source src="preview.mp4" type="video/mp4">
        </video>
    </div>

    <div class="screen london-screen carousel-screen" data-index="0">
        <img src="corgi-shock.png" class="character" alt="Corgi Shock">
        <div class="ui-buttons">
            <img src="btn-success.png" alt="Success">
            <img src="btn-error.png" alt="Error">
        </div>
    </div>

    <div class="screen london-screen carousel-screen" data-index="1">
        <img src="corgi-strange.png" class="character" alt="Corgi Strange">
        <div class="ui-buttons">
            <img src="btn-default.png" alt="Default">
            <img src="btn-success.png" alt="Success">
        </div>
    </div>

    <div class="screen london-screen carousel-screen" data-index="2">
        <img src="corgi-freddie.png" class="character" alt="Corgi Freddie">
        <div class="ui-buttons">
            <img src="btn-error.png" alt="Error">
            <img src="btn-default.png" alt="Default">
        </div>
    </div>

    <div id="nav-left" class="nav-zone nav-left" style="display: none;" onclick="prevSlide()">‹</div>
    <div id="nav-right" class="nav-zone nav-right" style="display: none;" onclick="nextSlide()">›</div>
</div>

<script>
    const video = document.getElementById('game-video');
    const videoScreen = document.getElementById('screen-video');
    const carouselScreens = document.querySelectorAll('.carousel-screen');
    const navLeft = document.getElementById('nav-left');
    const navRight = document.getElementById('nav-right');
    
    let currentSlide = 0;
    let videoLoopCount = 0;

    // Смена экранов
    function switchScreen(fromId, toElement) {
        if (typeof fromId === 'string') {
            document.getElementById(fromId).classList.remove('active');
        } else {
            fromId.classList.remove('active');
        }
        toElement.classList.add('active');
    }

    // 1. Нажатие на обложку -> Запуск видео
    function startGame() {
        switchScreen('screen-cover', videoScreen);
        video.play();
    }

    // 2. Логика клика по видео
    videoScreen.addEventListener('click', () => {
        const currentTime = video.currentTime;

        if (videoLoopCount === 0) {
            // Первый круг: реагирует только с 6.25 секунд
            if (currentTime >= 6.25) {
                goToCarousel();
            }
        } else {
            // Последующие круги: реагирует в любой момент
            goToCarousel();
        }
    });

    // Отслеживаем окончание первого круга видео
    video.addEventListener('ended', () => {
        videoLoopCount++;
        video.loop = true; // Теперь видео будет зациклено
        video.play();
    });

    // Переход к карусели (Экран 3)
    function goToCarousel() {
        video.pause();
        switchScreen(videoScreen, carouselScreens[0]);
        currentSlide = 0;
        updateNavButtons();
    }

    // 3. Управление каруселью (Свайп / Клик по стрелкам)
    function showSlide(index) {
        carouselScreens.forEach(screen => screen.classList.remove('active'));
        carouselScreens[index].add('active');
        currentSlide = index;
        updateNavButtons();
    }

    function nextSlide() {
        if (currentSlide < carouselScreens.length - 1) {
            switchScreen(carouselScreens[currentSlide], carouselScreens[currentSlide + 1]);
            currentSlide++;
            updateNavButtons();
        }
    }

    function prevSlide() {
        if (currentSlide > 0) {
            switchScreen(carouselScreens[currentSlide], carouselScreens[currentSlide - 1]);
            currentSlide--;
            updateNavButtons();
        }
    }

    function updateNavButtons() {
        // Показываем стрелки управления только на экранах карусели
        navLeft.style.display = currentSlide > 0 ? 'flex' : 'none';
        navRight.style.display = currentSlide < carouselScreens.length - 1 ? 'flex' : 'none';
    }

    // Добавление поддержки свайпов для мобильных устройств
    let touchStartX = 0;
    let touchEndX = 0;

    document.getElementById('game-container').addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    });

    document.getElementById('game-container').addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    });

    function handleSwipe() {
        // Проверяем, что мы сейчас на одном из экранов карусели
        if (!carouselScreens[currentSlide].classList.contains('active')) return;

        const swipeDistance = touchEndX - touchStartX;
        if (swipeDistance < -50) {
            nextSlide(); // Свайп влево -> следующий слайд
        }
        if (swipeDistance > 50) {
            prevSlide(); // Свайп вправо -> предыдущий слайд
        }
    }
</script>

</body>
</html>
