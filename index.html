<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карусель — Играть</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: sans-serif;
  }

  /* Контейнер карусели — формат 9:16, влезает в экран */
  .carousel {
    position: relative;
    width: min(100vw, 56.25vh);   /* 9:16 по ширине */
    height: min(177.78vw, 100vh); /* 9:16 по высоте */
    overflow: hidden;
    background: #111;
  }

  /* Дорожка со слайдами */
  .track {
    display: flex;
    height: 100%;
    transition: transform 0.4s ease;
  }

  /* Один слайд */
  .slide {
    min-width: 100%;
    height: 100%;
    position: relative;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;  /* картинка заполняет 9:16 без искажений */
    display: block;
  }

  /* Кнопка ИГРАТЬ на первом слайде */
  .play-btn {
    position: absolute;
    left: 50%;
    bottom: 12%;
    transform: translateX(-50%);
    padding: 16px 48px;
    font-size: 22px;
    font-weight: bold;
    color: #fff;
    background: #e63946;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    text-decoration: none;
  }

  .play-btn:active { transform: translateX(-50%) scale(0.95); }

  /* Стрелки переключения */
  .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.4);
    color: #fff;
    border: none;
    font-size: 28px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 5;
  }
  .prev { left: 10px; }
  .next { right: 10px; }

  /* Точки-индикаторы */
  .dots {
    position: absolute;
    bottom: 4%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 5;
  }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }
  .dot.active { background: #fff; }
</style>
</head>
<body>

<div class="carousel">
  <div class="track" id="track">

    <!-- ПЕРВЫЙ СЛАЙД — с кнопкой ИГРАТЬ -->
    <div class="slide">
      <img src="cover.png" alt="Старт">
      <a href="game.html" class="play-btn">▶ ИГРАТЬ</a>
    </div>

    <!-- Остальные слайды -->
    <div class="slide"><img src="slide2.png" alt="2"></div>
    <div class="slide"><img src="slide3.png" alt="3"></div>

  </div>

  <button class="nav prev" onclick="move(-1)">‹</button>
  <button class="nav next" onclick="move(1)">›</button>

  <div class="dots" id="dots"></div>
</div>

<script>
  const track = document.getElementById('track');
  const slides = track.children;
  const total = slides.length;
  let index = 0;

  // создаём точки
  const dotsBox = document.getElementById('dots');
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsBox.appendChild(d);
  }
  const dots = dotsBox.children;

  function update() {
    track.style.transform = `translateX(-${index * 100}%)`;
    for (let i = 0; i < total; i++)
      dots[i].classList.toggle('active', i === index);
  }

  function move(step) {
    index = (index + step + total) % total;
    update();
  }
</script>

</body>
</html>
