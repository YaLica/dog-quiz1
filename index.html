<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корги Интерактив</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #0f0f12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Контейнер-баннер (имитация мобильного поста) */
        #game-poster {
            width: 100%;
            max-width: 430px; /* Размер стандартного экрана смартфона */
            height: 92vh;
            max-height: 840px;
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            background: #000;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .screen.active {
            display: block;
        }

        /* Экран 1: Обложка (чистая картинка-ссылка) */
        #screen-cover {
            background-image: url('cover.png');
            cursor: pointer;
        }

        /* Экран 2: Видео */
        #screen-video {
            cursor: pointer;
        }
        #screen-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Экраны 3-6: Фон Лондон */
        .london-bg {
            background-image: url('london-bg.png');
        }
        
        /* Накладываемые персонажи */
        .corgi-overlay {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 85%;
            max-height: 55%;
            object-fit: contain;
            pointer-events: none; /* чтобы не мешать свайпу */
        }

        /* Интерфейсные кнопки внизу экранов */
        .bottom-buttons {
            position: absolute;
            bottom: 6%;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            z-index: 5;
        }
        .bottom-buttons img {
            width: 43%;
            max-width: 160px;
            height: auto;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .bottom-buttons img:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="game-poster">
    
    <div id="screen-cover" class="screen active" onclick="startGame()"></div>

    <div id="screen-video" class="screen" onclick="handleVideoClick()">
        <video id="main-video" playsinline poster="preview-thumb.jpg">
            <source src="preview.mp4" type="video/mp4">
        </video>
    </div>

    <div class="screen london-bg carousel-screen">
        <img src="corgi-shock.png" class="corgi-overlay" alt="Shock">
        <div class="bottom-buttons">
            <img src="btn-success.png" alt="Yes">
            <img src="btn-error.png" alt="No">
        </div>
    </div>

    <div class="screen london-bg carousel-screen">
        <img src="corgi-strange.png" class="corgi-overlay" alt="Strange">
        <div class="bottom-buttons">
            <img src="btn-default.png" alt="Option">
            <img src="btn-success.png" alt="Yes">
        </div>
    </div>

    <div class="screen london-bg carousel-screen">
        <img src="corgi-freddie.png" class="corgi-overlay" alt="Freddie">
        <div class="bottom-buttons">
            <img src="btn-error.png" alt="No">
            <img src="btn-default.png" alt="Option">
        </div>
    </div>

</div>

<script>
    const video = document.getElementById('main-video');
    const coverScreen = document.getElementById('screen-cover');
    const videoScreen = document.getElementById('screen-video');
    const carouselScreens = document.querySelectorAll('.carousel-screen');
    
    let currentSlide = 0;
    let isVideoLooped = false;

    // 1. Старт с обложки
    function startGame() {
        coverScreen.classList.remove('active');
        videoScreen.classList.add('active');
        video.play();
    }

    // 2. Клик по видео (учитывает 6.25 сек на первом круге)
    function handleVideoClick() {
        if (!isVideoLooped) {
            if (video.currentTime >= 6.25) {
                startCarousel();
            }
        } else {
            startCarousel();
        }
    }

    // Зацикливание видео, если первый круг прошли без клика
    video.addEventListener('ended', () => {
        isVideoLooped = true;
        video.loop = true;
        video.play();
    });

    // Переход к карусели
    function startCarousel() {
        video.pause();
        videoScreen.classList.remove('active');
        carouselScreens[0].add('active');
        initSwipe();
    }

    // 3. Логика свайпов (Туда-сюда между 3, 4 и 5 экранами)
    function initSwipe() {
        let touchStartX = 0;
        let touchEndX = 0;
        const poster = document.getElementById('game-poster');

        poster.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        poster.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = touchEndX - touchStartX;
            
            // Свайп влево -> Следующий экран
            if (swipeDistance < -50 && currentSlide < carouselScreens.length - 1) {
                carouselScreens[currentSlide].classList.remove('active');
                currentSlide++;
                carouselScreens[currentSlide].classList.add('active');
            }
            
            // Свайп вправо -> Предыдущий экран
            if (swipeDistance > 50 && currentSlide > 0) {
                carouselScreens[currentSlide].classList.remove('active');
                currentSlide--;
                carouselScreens[currentSlide].classList.add('active');
            }
        }
    }
</script>

</body>
</html>
