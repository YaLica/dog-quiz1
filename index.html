<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corgi Quiz</title>

<!-- ===== Open Graph (превью в Telegram) ===== -->
<meta property="og:type" content="website">
<meta property="og:title" content="Corgi Quiz">
<meta property="og:description" content="Пройди квиз с корги по Лондону!">
<meta property="og:image" content="https://yalica.github.io/dog-quiz1/cover.png">
<meta property="og:url" content="https://yalica.github.io/dog-quiz1/">
<meta name="twitter:card" content="summary_large_image">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%; overflow:hidden;
    background:#111;
    font-family:sans-serif;
    display:flex; align-items:center; justify-content:center;
  }

  /* Игровое окно 9:16, вписано в экран */
  #carousel {
    position:relative;
    aspect-ratio: 9 / 16;
    height:100vh;
    max-width:100vw;
    overflow:hidden;
    background:#000;
  }
  @media (max-aspect-ratio: 9/16){
    #carousel { width:100vw; height:auto; }
  }

  .track { display:flex; height:100%; transition:transform .4s ease; }
  .slide {
    flex:0 0 100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:22px; position:relative;
  }

  #screen1 { background:#000; }
  #cover { width:100%; height:100%; object-fit:cover; cursor:pointer; }

  #screen2 { background:#000; }
  #video { width:100%; height:100%; object-fit:cover; }

  #screen3, #screen4, #screen5, #screen6 {
    background:url('london-bg.png') center/cover no-repeat;
  }
</style>
</head>
<body>

<div id="carousel">
  <div class="track" id="track">

    <!-- Экран 1: обложка = кнопка -->
    <div class="slide" id="screen1">
      <img id="cover" src="cover.png" alt="cover">
    </div>

    <!-- Экран 2: видео со звуком -->
    <div class="slide" id="screen2">
      <video id="video" src="preview.mp4" loop playsinline></video>
    </div>

    <!-- Экраны 3-6: фон Лондона -->
    <div class="slide" id="screen3"></div>
    <div class="slide" id="screen4"></div>
    <div class="slide" id="screen5"></div>
    <div class="slide" id="screen6"></div>

  </div>
</div>

<script>
  const track = document.getElementById('track');
  const cover = document.getElementById('cover');
  const video = document.getElementById('video');

  let current = 0;
  let swipeEnabled = false;
  let videoReactive = false;
  let lastTime = 0;
  let loopCount = 0;

  function goTo(i){
    current = i;
    track.style.transform = 'translateX(' + (-100*i) + '%)';
    swipeEnabled = (current >= 2);
  }

  cover.addEventListener('click', () => {
    goTo(1);
    video.muted = false;
    video.currentTime = 0;
    loopCount = 0;
    videoReactive = false;
    video.play();
  });

  video.addEventListener('timeupdate', () => {
    if (video.currentTime >= 6.25) videoReactive = true;
    if (lastTime > 1 && video.currentTime < 0.5) {
      loopCount++;
      videoReactive = true;
    }
    lastTime = video.currentTime;
  });

  video.addEventListener('click', () => {
    if (videoReactive) { video.pause(); goTo(2); }
  });

  let startX = 0;
  function handleSwipe(dx){
    if (!swipeEnabled) return;
    if (dx < -50){ current < 5 ? goTo(current+1) : goTo(2); }
    else if (dx > 50){ if (current > 2) goTo(current-1); }
  }
  track.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  track.addEventListener('touchend',   e => handleSwipe(e.changedTouches[0].clientX - startX));
  let md=false;
  track.addEventListener('mousedown', e => { md=true; startX=e.clientX; });
  track.addEventListener('mouseup',   e => { if(md){ handleSwipe(e.clientX-startX); md=false; } });
  document.addEventListener('keydown', e => {
    if(e.key==='ArrowLeft')  handleSwipe(60);
    if(e.key==='ArrowRight') handleSwipe(-60);
  });

  goTo(0);
</script>
</body>
</html>
